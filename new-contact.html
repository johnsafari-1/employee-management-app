<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Contact - Employee Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">Employee Management System</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="new-contact.html" class="active">New Contact</a></li>
                <li><a href="view-contact.html">View All Contacts</a></li>
            </ul>
        </div>
    </nav>
    <main class="container">
        <div class="form-container">
            <h1>Add New Employee</h1>
            <form id="employeeForm">
                <div class="form-group">
                    <label for="fullName">Full Name *</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" placeholder="Enter email address" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter phone number" required>
                </div>

                <div class="form-group">
                    <label for="department">Department *</label>
                    <select id="department" name="department" required>
                        <option value="">Select Department</option>
                        <option value="Human Resources">Human Resources</option>
                        <option value="Finance">Finance</option>
                        <option value="IT">IT</option>
                        <option value="Sales">Sales</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Operations">Operations</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="position">Position *</label>
                    <input type="text" id="position" name="position" placeholder="Enter job position" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Contact</button>
                    <button type="reset" class="btn btn-secondary">Clear Form</button>
                </div>
            </form>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Employee Management System. All rights reserved.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
